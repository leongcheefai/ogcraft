<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @media (prefers-color-scheme: light) {
      .bg { fill: #0a0a0a; }
      .card { fill: none; stroke: white; stroke-width: 5; }
      .line { fill: white; }
      .accent { fill: #a78bfa; }
    }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #fafafa; }
      .card { fill: none; stroke: #0a0a0a; stroke-width: 5; }
      .line { fill: #0a0a0a; }
      .accent { fill: #7c3aed; }
    }
  </style>
  <rect class="bg" width="180" height="180" rx="37" />
  <!-- OG preview card shape (landscape ratio) -->
  <rect class="card" x="30" y="48" width="120" height="72" rx="8" />
  <!-- Title line -->
  <rect class="line" x="46" y="66" width="64" height="7" rx="3.5" />
  <!-- Subtitle line -->
  <rect class="line" x="46" y="80" width="44" height="5" rx="2.5" />
  <!-- URL/domain line -->
  <rect class="line" x="46" y="96" width="30" height="4" rx="2" />
  <!-- Accent dot (logo/brand mark) -->
  <circle class="accent" cx="134" cy="104" r="6" />
  <!-- Sparkle/craft accent (top-right of card) -->
  <path class="accent" d="M140 40l3 8 8 3-8 3-3 8-3-8-8-3 8-3z" />
</svg>
